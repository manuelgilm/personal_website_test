name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      
      - name: Set up Python for mkdocs
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install mkdocs dependencies
        run: |
          pip install mkdocs mkdocs-material
      
      - name: Build versioned documentation
        run: |
          cd docs
          chmod +x build-versioned-docs.sh
          ./build-versioned-docs.sh
          cd ..
      
      - name: Prepare docs for deployment
        run: |
          mkdir -p src/docs
          mkdir -p src/mlflow
          mkdir -p src/bot
          cp -r docs/site_en src/docs/site_en
          cp -r docs/site_es src/docs/site_es
          cp -r docs/build/mlflow/* src/mlflow/ || true
          cp -r docs/build/bot/* src/bot/ || true
          cp staticwebapp.json src/staticwebapp.json
                    
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_OCEAN_06863000F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "./src" # App source code path
          api_location: "./api" # Api source code path - optional
          output_location: "." # Built app content directory - optional
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_OCEAN_06863000F }}
          action: "close"
